services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-population}
      POSTGRES_USER: ${POSTGRES_USER:-population}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-population}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-population} -d ${POSTGRES_DB:-population}"]
      interval: 5s
      timeout: 5s
      retries: 10

  get_data:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATA_SOURCE: ${DATA_SOURCE:-wikipedia}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-population}
      POSTGRES_USER: ${POSTGRES_USER:-population}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-population}
    command: ["get_data"]

  print_data:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATA_SOURCE: ${DATA_SOURCE:-wikipedia}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-population}
      POSTGRES_USER: ${POSTGRES_USER:-population}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-population}
    command: ["print_data"]

volumes:
  pgdata:
